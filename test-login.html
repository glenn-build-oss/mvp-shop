<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <button onclick="testShowLogin()" class="bg-blue-600 text-white px-4 py-2 rounded">
        Test Login Button
    </button>
    
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg max-w-md w-full p-6">
                <h3 class="text-2xl font-bold mb-6 text-center">Admin Login</h3>
                <form id="login-form">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                        <input type="password" id="admin-password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-blue-500" placeholder="Enter admin password">
                    </div>
                    <div class="flex space-x-4">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                            <i class="fas fa-sign-in-alt mr-2"></i>Login
                        </button>
                        <button type="button" onclick="closeLogin()" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-400 transition">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let testApp = {
            adminPassword: 'admin1234',
            isAdminLoggedIn: false,
            
            showLogin() {
                console.log('showLogin called');
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            },
            
            closeLogin() {
                console.log('closeLogin called');
                document.getElementById('login-modal').classList.add('hidden');
            },
            
            handleLogin() {
                console.log('handleLogin called');
                const password = document.getElementById('admin-password').value;
                console.log('Password entered:', password);
                
                if (password === this.adminPassword) {
                    this.isAdminLoggedIn = true;
                    this.closeLogin();
                    alert('Login successful!');
                } else {
                    alert('Invalid password!');
                    document.getElementById('admin-password').value = '';
                    document.getElementById('admin-password').focus();
                }
            }
        };

        function testShowLogin() {
            console.log('testShowLogin called');
            testApp.showLogin();
        }

        function closeLogin() {
            testApp.closeLogin();
        }

        // Initialize event listener
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                console.log('Form submitted');
                testApp.handleLogin();
            });
        });
    </script>
</body>
</html>
